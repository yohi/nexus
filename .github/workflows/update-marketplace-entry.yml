name: Update marketplace entry

on:
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Plugin name override (default: repo variable PLUGIN_NAME)'
        required: false
        default: ''
      plugin_description:
        description: 'Plugin description override (default: repo variable PLUGIN_DESCRIPTION)'
        required: false
        default: ''
      workspace_name:
        description: 'Bitbucket workspace name override (default: repo variable BITBUCKET_WORKSPACE_NAME)'
        required: false
        default: ''
      plugin_repository_name:
        description: 'Plugin distribution repository name override (default: repo variable BITBUCKET_PLUGIN_REPOSITORY_NAME)'
        required: false
        default: ''
      plugin_ref:
        description: 'Git tag/branch to pin plugin source to (optional, e.g. v1.24.0)'
        required: false
        default: ''
      marketplace_repository_name:
        description: 'Marketplace catalog repository name override (default: repo variable BITBUCKET_MARKETPLACE_REPOSITORY_NAME)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  update-marketplace:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update marketplace.json and push (with retry on conflict)
        env:
          BITBUCKET_MARKETPLACE_TOKEN: ${{ secrets.BITBUCKET_MARKETPLACE_TOKEN }}
          BITBUCKET_WORKSPACE_NAME: ${{ inputs.workspace_name || vars.BITBUCKET_WORKSPACE_NAME }}
          BITBUCKET_PLUGIN_REPOSITORY_NAME: ${{ inputs.plugin_repository_name || vars.BITBUCKET_PLUGIN_REPOSITORY_NAME }}
          BITBUCKET_MARKETPLACE_REPOSITORY_NAME: ${{ inputs.marketplace_repository_name || vars.BITBUCKET_MARKETPLACE_REPOSITORY_NAME }}
          PLUGIN_NAME: ${{ inputs.plugin_name || vars.PLUGIN_NAME }}
          PLUGIN_DESCRIPTION: ${{ inputs.plugin_description || vars.PLUGIN_DESCRIPTION }}
          PLUGIN_REF: ${{ inputs.plugin_ref }}
        run: |
          set -euo pipefail
          if [[ -z "${BITBUCKET_MARKETPLACE_TOKEN:-}" ]]; then
            echo "BITBUCKET_MARKETPLACE_TOKEN secret is not set." >&2
            exit 1
          fi
          scripts/update-marketplace-catalog.sh
