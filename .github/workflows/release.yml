name: release-please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-slim
    steps:
      - uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
        id: release
        with:
          release-type: node
          target-branch: master

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          ref: ${{ steps.release.outputs.tag_name }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: '26'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@yohi'
      - name: Install dependencies
        run: npm ci
        if: ${{ steps.release.outputs.release_created }}
      - name: Build
        run: npm run build
        if: ${{ steps.release.outputs.release_created }}
      - name: Upload Build Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nexus-dist
          path: dist/
        if: ${{ steps.release.outputs.release_created }}
      - name: Publish to GitHub Packages
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXUS_GH_PACKAGE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.release.outputs.release_created }}
      - name: Pack and Upload Release Asset
        run: |
          PACKAGE_FILE=$(npm pack)
          gh release upload ${{ steps.release.outputs.tag_name }} $PACKAGE_FILE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.release.outputs.release_created }}

      - name: Install required tools for Bitbucket sync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync jq
        if: ${{ steps.release.outputs.release_created }}

      - name: Clone Bitbucket Marketplace Repo
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          git clone https://x-token-auth:${BITBUCKET_TOKEN}@bitbucket.org/dh_ohi/claude-plugins.git bitbucket-repo
          cd bitbucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
        if: ${{ steps.release.outputs.release_created }}

      - name: Sync Plugin and Update Catalog
        run: |
          cd bitbucket-repo
          
          # GitHubリポジトリ名を自動的にプラグイン名としてセット
          PLUGIN_NAME="${{ github.event.repository.name }}"
          mkdir -p "plugins/$PLUGIN_NAME"
          
          # ビルド済みの成果物を含めて同期（node_modulesやテストコードなどは除外）
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='coverage' \
            --exclude='bitbucket-repo' \
            ../ "plugins/$PLUGIN_NAME/"
          
          COMMIT_SHA="${{ github.sha }}"
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          
          # カタログファイル marketplace.json がなければ新規作成
          if [ ! -f .claude-plugin/marketplace.json ]; then
            mkdir -p .claude-plugin
            echo '{"name": "dh-ohi-plugins", "owner": {"name": "dh_ohi"}, "plugins": []}' > .claude-plugin/marketplace.json
          fi
          
          # プラグイン情報（SHAとバージョン）を更新する (jq)
          jq --arg name "$PLUGIN_NAME" --arg sha "$COMMIT_SHA" --arg ver "$TAG_NAME" '
            if (.plugins | map(.name) | contains([$name]) | not) then
              .plugins += [{
                "name": $name,
                "source": ("./plugins/" + $name),
                "description": "Auto-synced plugin"
              }]
            else
              .
            end |
            .plugins |= map(if .name == $name then .sha = $sha | .version = $ver else . end)
          ' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
        if: ${{ steps.release.outputs.release_created }}

      - name: Push changes to Bitbucket
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          cd bitbucket-repo
          PLUGIN_NAME="${{ github.event.repository.name }}"
          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          
          git add -A
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: release $TAG_NAME for $PLUGIN_NAME [skip ci]"
            git push https://x-token-auth:${BITBUCKET_TOKEN}@bitbucket.org/dh_ohi/claude-plugins.git HEAD
          fi
        if: ${{ steps.release.outputs.release_created }}

