name: Deploy plugin to Bitbucket

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BITBUCKET_REPO_URL: ${{ vars.BITBUCKET_PLUGIN_REPO_URL || 'https://bitbucket.org/y-ohi/nexus.git' }}
    steps:
      - name: Get latest GitHub release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: release } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('tag', release.tag_name);
            } catch (err) {
              if (err.status === 404) {
                core.setFailed('No GitHub Release found. Create a release before running this workflow.');
              } else {
                core.setFailed(`Failed to fetch latest release: ${err.message}`);
              }
            }

      - name: Check existing Bitbucket tag
        id: bitbucket
        run: |
          set -euo pipefail
          if [[ "${BITBUCKET_REPO_URL}" != https://* ]]; then
            echo "BITBUCKET_REPO_URL must start with https://: ${BITBUCKET_REPO_URL}" >&2
            exit 1
          fi
          if [ -z "${BITBUCKET_API_TOKEN}" ]; then
            echo "BITBUCKET_API_TOKEN not set" >&2
            exit 1
          fi
          ASKPASS_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT"' EXIT
          printf '#!/bin/sh\necho "$BITBUCKET_API_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"
          REPO_URL="https://x-token-auth@${BITBUCKET_REPO_URL#https://}"
          TAG=$(git ls-remote --tags "${REPO_URL}" \
            | sed 's#^[^[:space:]]*[[:space:]]*refs/tags/##' \
            | { grep -v '\^{}' || true; } \
            | sort -V \
            | tail -n 1)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "${TAG}" = "${RELEASE_TAG}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Bitbucket already at ${TAG}. Nothing to do."
          fi
          if git ls-remote --tags --exit-code "${REPO_URL}" "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${RELEASE_TAG} already exists on Bitbucket. Tag push will be skipped."
          fi
        env:
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}

      - name: Checkout release tag
        if: steps.bitbucket.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Node.js
        if: steps.bitbucket.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        if: steps.bitbucket.outputs.skip != 'true'
        run: npm ci

      - name: Lint and test
        if: steps.bitbucket.outputs.skip != 'true'
        run: |
          npm run lint
          npm run test

      - name: Stage plugin source mirror
        if: steps.bitbucket.outputs.skip != 'true'
        run: scripts/stage-plugin-dist.sh dist-staging
        env:
          NEXUS_EMBEDDING_REGION: ${{ vars.NEXUS_EMBEDDING_REGION }}
          NEXUS_EMBEDDING_PROFILE: ${{ vars.NEXUS_EMBEDDING_PROFILE }}
          NEXUS_EMBEDDING_MODEL: ${{ vars.NEXUS_EMBEDDING_MODEL }}
          NEXUS_EMBEDDING_DIMENSIONS: ${{ vars.NEXUS_EMBEDDING_DIMENSIONS }}

      - name: Verify source mirror builds standalone
        if: steps.bitbucket.outputs.skip != 'true'
        run: |
          cp -r dist-staging verify-build
          cd verify-build
          npm install --no-audit --no-fund
          npm run build
          test -f dist/bin/nexus.js
          echo "Source mirror is self-sufficient."

      - name: Validate plugin manifest
        if: steps.bitbucket.outputs.skip != 'true'
        run: npx -y @anthropic-ai/claude-code@2.1.197 plugin validate ./verify-build --strict

      - name: Push to Bitbucket
        if: steps.bitbucket.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if [[ "${BITBUCKET_REPO_URL}" != https://* ]]; then
            echo "BITBUCKET_REPO_URL must start with https://: ${BITBUCKET_REPO_URL}" >&2
            exit 1
          fi
          ASKPASS_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT"' EXIT
          printf '#!/bin/sh\necho "$BITBUCKET_API_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"
          cd dist-staging
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git commit -m "deploy ${RELEASE_TAG}"
          git tag "${RELEASE_TAG}"
          # トークンは GIT_ASKPASS 経由で渡し、remote URL やコマンド引数には出さない
          git remote add bitbucket "https://x-token-auth@${BITBUCKET_REPO_URL#https://}"
          git push --force bitbucket main
          if [ "${TAG_EXISTS}" = "true" ]; then
            echo "Skipping tag push because ${RELEASE_TAG} already exists on Bitbucket."
          else
            git push bitbucket "${RELEASE_TAG}"
          fi
        env:
          BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          TAG_EXISTS: ${{ steps.bitbucket.outputs.tag_exists }}

      - name: Update marketplace catalog (optional)
        if: steps.bitbucket.outputs.skip != 'true'
        env:
          BITBUCKET_MARKETPLACE_TOKEN: ${{ secrets.BITBUCKET_MARKETPLACE_TOKEN }}
          MARKETPLACE_REPO_URL: ${{ vars.BITBUCKET_MARKETPLACE_REPO_URL || 'https://bitbucket.org/y-ohi/claude-plugins.git' }}
          PLUGIN_NAME: yohi-nexus
          PLUGIN_DESCRIPTION: Nexus local code indexing and hybrid search MCP plugin
          PLUGIN_BITBUCKET_URL: ${{ vars.BITBUCKET_PLUGIN_REPO_URL || 'https://bitbucket.org/y-ohi/nexus.git' }}
        run: |
          set -euo pipefail

          if [[ -z "${BITBUCKET_MARKETPLACE_TOKEN:-}" ]]; then
            echo "BITBUCKET_MARKETPLACE_TOKEN is not set. Skipping marketplace catalog update."
            echo "Set the secret and re-run this workflow, or run the 'Update marketplace entry' workflow manually."
            exit 0
          fi

          ASKPASS_SCRIPT="$(mktemp)"

          printf '#!/bin/sh\necho "$BITBUCKET_MARKETPLACE_TOKEN"\n' > "$ASKPASS_SCRIPT"
          chmod +x "$ASKPASS_SCRIPT"
          export GIT_ASKPASS="$ASKPASS_SCRIPT"
          if [[ "${MARKETPLACE_REPO_URL}" != https://* ]]; then
            echo "MARKETPLACE_REPO_URL must start with https://: ${MARKETPLACE_REPO_URL}" >&2
            exit 1
          fi

          REPO_URL="https://x-token-auth@${MARKETPLACE_REPO_URL#https://}"
          WORKDIR="$(mktemp -d)"
          MAX_RETRIES=5

          UPDATE_SCRIPT="$(mktemp)"
          trap 'rm -f "$ASKPASS_SCRIPT" "$UPDATE_SCRIPT"' EXIT
          cat > "$UPDATE_SCRIPT" <<'NODE_SCRIPT'
          const fs = require('fs');
          const path = '.claude-plugin/marketplace.json';
          let catalog;
          try {
            catalog = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch {
            catalog = { name: 'company-internal-plugins', owner: { name: 'Internal Dev Team' }, plugins: [] };
          }
          const name = process.env.PLUGIN_NAME;
          const entry = {
            name,
            description: process.env.PLUGIN_DESCRIPTION,
            source: { source: 'url', url: process.env.PLUGIN_BITBUCKET_URL },
          };
          const idx = catalog.plugins.findIndex((p) => p.name === name);
          if (idx >= 0) {
            catalog.plugins[idx] = entry;
          } else {
            catalog.plugins.push(entry);
          }
          fs.mkdirSync('.claude-plugin', { recursive: true });
          fs.writeFileSync(path, JSON.stringify(catalog, null, 2) + '\n');
          NODE_SCRIPT

          for attempt in $(seq 1 "$MAX_RETRIES"); do
            cd "$RUNNER_TEMP"
            rm -rf "$WORKDIR"
            git clone "$REPO_URL" "$WORKDIR"
            cd "$WORKDIR"
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"

            node "$UPDATE_SCRIPT"

            node -e "
              const m = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json'));
              if (!m.name || !m.plugins) throw new Error('invalid marketplace.json structure');
              for (const p of m.plugins) {
                if (!p.name || !p.source?.url) throw new Error('invalid plugin entry: ' + JSON.stringify(p));
              }
            "

            git add .claude-plugin/marketplace.json
            if git diff --cached --quiet; then
              echo "No changes to commit (entry already up to date)."
              exit 0
            fi
            git commit -m "chore: update ${PLUGIN_NAME} marketplace entry"

            if git push origin HEAD; then
              echo "Pushed marketplace catalog successfully on attempt ${attempt}."
              exit 0
            fi

            echo "Push rejected (possible concurrent update). Retrying (${attempt}/${MAX_RETRIES})..."
            sleep $((RANDOM % 5 + 1))
          done

          echo "Failed to push marketplace catalog after ${MAX_RETRIES} attempts." >&2
          exit 1
