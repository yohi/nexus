---
engines:
  eslint:
    enabled: true
    config: "eslint.config.mjs"
ignore_paths:
  - "dist/**"
  - "node_modules/**"
  - ".nexus/**"
  - "tests/**"
  - "coverage/**"
  - "scripts/**"
  # Ignore specific files with inevitable non-literal arguments or complex logic for static analysis
  - "src/server/factory.ts"
  - "src/bin/nexus.ts"
security:
  excluded_rules:
    - "ESLint_security_detect-non-literal-fs-filename"
    - "ESLint_security_detect-object-injection"
    - "S2589" # Boolean expressions should not be constant (SonarJS)
    - "S1125" # Literal boolean values should not be used (SonarJS)
    - "S2259" # Null pointers should not be dereferenced (SonarJS)
