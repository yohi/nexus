---
engines:
  eslint:
    enabled: true
    config: "eslint.config.mjs"
exclude_paths:
  - "dist/**"
  - "node_modules/**"
  - ".nexus/**"
  - "tests/**"
  - "coverage/**"
  - "scripts/**"
  - "src/server/factory.ts"
  - "src/bin/nexus.ts"
  - "src/server/index.ts"
  - "packages/dashboard/src/utils/metrics.ts"
  - "**/*.test.ts"
  - "**/*.bench.ts"
ignore_issues:
  - pattern_id: "GenericObjectInjectionSink"
    files:
      - "packages/dashboard/src/app.tsx"
      - "packages/dashboard/src/components/*.tsx"
  - pattern_id: "security/detect-object-injection"
    files:
      - "packages/dashboard/src/app.tsx"
      - "packages/dashboard/src/components/*.tsx"
  - pattern_id: "useQwikValidLexicalScope"
    files:
      - "src/indexer/watcher.ts"
  - pattern_id: "lint/correctness/useQwikValidLexicalScope"
    files:
      - "src/indexer/watcher.ts"
